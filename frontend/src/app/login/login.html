<div class="login-container">
  <h2>Login de la Gramola</h2>

  <form (ngSubmit)="login()" autocomplete="off">
    <input type="text" name="fake-user" autocomplete="username" style="display:none">
    <input type="password" name="fake-password" autocomplete="new-password" style="display:none">

    <div>
      <label for="gramolaLoginEmail">Email del bar:</label>
      <input 
        id="gramolaLoginEmail"
        type="email" 
        name="gramolaNoAutofillEmail"
        [(ngModel)]="email"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        required>
    </div>
    
    <div>
      <label for="gramolaLoginPassword">Contraseña:</label>
      <input 
        id="gramolaLoginPassword"
        type="password" 
        name="gramolaNoAutofillPassword"
        [(ngModel)]="pwd"
        autocomplete="new-password"
        required>
    </div>
    
    <label class="remember-row">
      <input 
        type="checkbox" 
        name="rememberMe" 
        [(ngModel)]="rememberMe"> 
      Recordar mi correo
    </label>

    <button type="submit">Entrar</button>
  </form>
  
  <div class="forgot-link">
    <a routerLink="/forgot-password">
      He olvidado mi contraseña
    </a>
  </div>

  <div *ngIf="errorMsg" class="login-error">
    {{ errorMsg }}
  </div>
</div>
