<div class="reset-page">
  <div class="reset-card">
    <h1>Nueva contraseña</h1>

    <p>
      Escribe una nueva contraseña para tu cuenta de La Gramola.
    </p>

    <input 
      type="password"
      [(ngModel)]="password"
      placeholder="Nueva contraseña">

    <input 
      type="password"
      [(ngModel)]="confirmPassword"
      placeholder="Repetir contraseña"
      (keyup.enter)="resetPassword()">

    <button 
      type="button"
      (click)="resetPassword()"
      [disabled]="loading">
      {{ loading ? 'Guardando...' : 'Cambiar contraseña' }}
    </button>

    <button 
      type="button"
      class="secondary-btn"
      (click)="goBackToLogin()">
      Volver al login
    </button>

    <div class="success" *ngIf="message">
      {{ message }}
    </div>

    <div class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
  </div>
</div>
